<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Motor Matemático - Navegación Fantasma Real</title>
    
    <script>
        window.MathJax = {
            loader: { load: ['[tex]/html'] },
            tex: { 
                packages: {'[+]': ['html']},
                inlineMath: [['$', '$']], 
                displayMath: [['$$', '$$']]
            },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>

    <style>
        body {
            background-color: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-size: 50px;
            color: white;
            font-family: sans-serif;
        }

        #indicador-modo {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 16px;
            font-family: monospace;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }

        .modo-insercion { background-color: #007acc; color: white; }
        .modo-comando { background-color: #ff9800; color: black; box-shadow: 0 0 10px rgba(255, 152, 0, 0.5); }

        #lienzo {
            padding: 50px;
            background: #2d2d2d;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            min-width: 400px;
            min-height: 80px;
            text-align: center;
        }

        .hitbox {
            transition: all 0.1s ease;
            cursor: pointer;
            padding: 2px;
            margin: 1px;
        }

        .hitbox:hover {
            background-color: rgba(80, 180, 255, 0.2);
            outline: 2px dashed rgba(80, 180, 255, 0.6);
            border-radius: 4px;
        }

        .hitbox.seleccionado {
            background-color: rgba(0, 255, 128, 0.25) !important;
            outline: 2px solid rgb(0, 255, 128) !important;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="indicador-modo" class="modo-insercion">INSERCIÓN</div>
    <div id="lienzo">Cargando motor...</div>

    <script>
        const AJUSTES = { fraccionInteligente: true, reconocimientoFunciones: true };
        let modoGlobal = 'INSERCION'; 

        function actualizarUI() {
            const indicador = document.getElementById('indicador-modo');
            indicador.textContent = modoGlobal;
            indicador.className = modoGlobal === 'INSERCION' ? 'modo-insercion' : 'modo-comando';
        }

        // ==========================================
        // 1. CEREBRO: AST Y MEMORIA
        // ==========================================
        const TIPO = {
            CONTENEDOR: 'contenedor', VARIABLE: 'variable', NUMERO: 'numero',
            OPERADOR: 'operador', FRACCION: 'fraccion', INTEGRAL: 'integral',
            RAIZ: 'raiz', PARENTESIS: 'parentesis', SUBSUPER: 'subsuper', 
            FUNCION: 'funcion', HUECO: 'hueco'
        };

        const registroNodos = {}; 
        let nodoSeleccionado = null; 

        function generarId() { return 'nodo-' + Math.random().toString(36).substr(2, 9); }
        function registrar(nodo) { registroNodos[nodo.id] = nodo; return nodo; }

        function crearNodoValor(tipo, valor) { return registrar({ id: generarId(), tipo: tipo, valor: valor, padre: null }); }
        function crearNodoContenedor() { return registrar({ id: generarId(), tipo: TIPO.CONTENEDOR, hijos: [], padre: null }); }
        
        // Estandarización Absoluta: Toda estructura DEBE envolver sus partes en Contenedores
        function crearEstructuraEstandar(tipo, props) {
            const nodo = registrar({ id: generarId(), tipo: tipo, padre: null });
            for (let key in props) {
                const contenedor = crearNodoContenedor();
                contenedor.padre = nodo;
                if (props[key]) {
                    props[key].padre = contenedor;
                    contenedor.hijos.push(props[key]);
                } else {
                    const hueco = crearNodoValor(TIPO.HUECO, null);
                    hueco.padre = contenedor;
                    contenedor.hijos.push(hueco);
                }
                nodo[key] = contenedor;
            }
            return nodo;
        }

        let arbolPrincipal = crearNodoContenedor();
        let huecoInicial = crearNodoValor(TIPO.HUECO, null);
        huecoInicial.padre = arbolPrincipal;
        arbolPrincipal.hijos.push(huecoInicial);
        nodoSeleccionado = huecoInicial;

        // ==========================================
        // 1.5 HISTORIAL
        // ==========================================
        let historialDeshacer = [];

        function serializarArbol(nodo) {
            if (!nodo) return null;
            const clon = { id: nodo.id, tipo: nodo.tipo };
            if (nodo.valor !== undefined) clon.valor = nodo.valor;
            if (nodo.nombre !== undefined) clon.nombre = nodo.nombre;
            if (nodo.hijos) clon.hijos = nodo.hijos.map(serializarArbol);
            
            ['numerador', 'denominador', 'inferior', 'superior', 'integrando', 'interior', 'base', 'subindice', 'exponente', 'argumento'].forEach(key => {
                if (nodo[key]) clon[key] = serializarArbol(nodo[key]);
            });
            return clon;
        }

        function reconstruirArbol(clon, padre = null) {
            if (!clon) return null;
            const nodo = { ...clon, padre: padre };
            registroNodos[nodo.id] = nodo; 
            if (nodo.hijos) nodo.hijos = nodo.hijos.map(h => reconstruirArbol(h, nodo));
            
            ['numerador', 'denominador', 'inferior', 'superior', 'integrando', 'interior', 'base', 'subindice', 'exponente', 'argumento'].forEach(key => {
                if (nodo[key]) nodo[key] = reconstruirArbol(nodo[key], nodo);
            });
            return nodo;
        }

        function capturarEstadoPreMutacion() {
            return { arbolStr: JSON.stringify(serializarArbol(arbolPrincipal)), idSeleccionado: nodoSeleccionado ? nodoSeleccionado.id : null };
        }

        function evaluarYGuardarHistorial(estadoPre) {
            const estadoPostStr = JSON.stringify(serializarArbol(arbolPrincipal));
            if (estadoPre.arbolStr !== estadoPostStr) {
                historialDeshacer.push({ arbol: JSON.parse(estadoPre.arbolStr), idSeleccionado: estadoPre.idSeleccionado });
                if (historialDeshacer.length > 50) historialDeshacer.shift();
            }
        }

        function deshacer() {
            if (historialDeshacer.length === 0) return;
            const estadoAnterior = historialDeshacer.pop();
            for (let key in registroNodos) delete registroNodos[key];
            arbolPrincipal = reconstruirArbol(estadoAnterior.arbol);
            nodoSeleccionado = registroNodos[estadoAnterior.idSeleccionado] || arbolPrincipal.hijos[0];
            renderizar();
        }

        // ==========================================
        // 2. LÓGICA DE MANIPULACIÓN 
        // ==========================================
        function reemplazarEnPadre(viejoNodo, nuevoNodo) {
            const padre = viejoNodo.padre;
            if (!padre) return; 
            nuevoNodo.padre = padre;

            if (padre.tipo === TIPO.CONTENEDOR) {
                const idx = padre.hijos.indexOf(viejoNodo);
                if (idx !== -1) padre.hijos[idx] = nuevoNodo;
            } else {
                for (let key of ['numerador', 'denominador', 'inferior', 'superior', 'integrando', 'interior', 'base', 'subindice', 'exponente', 'argumento']) {
                    if (padre[key] === viejoNodo) { padre[key] = nuevoNodo; break; }
                }
            }
        }

        function insertarEnCursor(nuevoNodo) {
            if (!nodoSeleccionado) return;
            if (nodoSeleccionado.tipo === TIPO.HUECO) {
                reemplazarEnPadre(nodoSeleccionado, nuevoNodo);
                delete registroNodos[nodoSeleccionado.id];
                nodoSeleccionado = nuevoNodo;
            } else if (nodoSeleccionado.tipo === TIPO.CONTENEDOR) {
                nuevoNodo.padre = nodoSeleccionado;
                nodoSeleccionado.hijos.push(nuevoNodo);
                nodoSeleccionado = nuevoNodo;
            } else {
                const padre = nodoSeleccionado.padre;
                if (padre && padre.tipo === TIPO.CONTENEDOR) {
                    nuevoNodo.padre = padre;
                    const idx = padre.hijos.indexOf(nodoSeleccionado);
                    padre.hijos.splice(idx + 1, 0, nuevoNodo);
                    nodoSeleccionado = nuevoNodo;
                }
            }
        }

        // --- GATILLO COMPILADOR Y ESCÁNER ---
        function intentarCompilarFuncion() {
            if (!AJUSTES.reconocimientoFunciones || !nodoSeleccionado || !nodoSeleccionado.padre) return false;
            const padre = nodoSeleccionado.padre;
            if (padre.tipo !== TIPO.CONTENEDOR) return false;

            const idxActual = padre.hijos.indexOf(nodoSeleccionado);
            let palabraEscaneada = "";
            let nodosAborrar = [];

            for (let i = idxActual; i >= 0; i--) {
                const n = padre.hijos[i];
                if (n.tipo === TIPO.VARIABLE) {
                    palabraEscaneada = n.valor + palabraEscaneada;
                    nodosAborrar.unshift(n);
                } else { break; }
            }

            const diccionario = ['sin', 'cos', 'tan', 'sec', 'csc', 'cot', 'arcsin', 'arccos', 'arctan', 'ln', 'log', 'lim', 'sinh', 'cosh', 'tanh'];
            let funcEncontrada = null, longitudFunc = 0;

            for(let f of diccionario) {
                if (palabraEscaneada.endsWith(f) && f.length > longitudFunc) {
                    funcEncontrada = f; longitudFunc = f.length;
                }
            }

            if (funcEncontrada) {
                const nodosFunc = nodosAborrar.slice(nodosAborrar.length - longitudFunc);
                const idxInicioFunc = padre.hijos.indexOf(nodosFunc[0]);
                
                const nodoFunc = crearEstructuraEstandar(TIPO.FUNCION, { argumento: null });
                nodoFunc.nombre = funcEncontrada;
                nodoFunc.padre = padre;

                padre.hijos.splice(idxInicioFunc, longitudFunc, nodoFunc);
                nodosFunc.forEach(n => delete registroNodos[n.id]);
                nodoSeleccionado = nodoFunc.argumento.hijos[0];
                return true;
            }
            return false;
        }

        function escanearFronteraIzquierda(padre, idxActual) {
            let idxInicio = idxActual;
            const fronteras = ['+', '-', '=', '<', '>', '\\le', '\\ge']; 
            while (idxInicio >= 0) {
                const nodoAnalizado = padre.hijos[idxInicio];
                if (nodoAnalizado.tipo === TIPO.OPERADOR && fronteras.includes(nodoAnalizado.valor)) break;
                idxInicio--;
            }
            return idxInicio + 1; 
        }

        function aplicarFraccionInteligente() {
            if (!nodoSeleccionado || !nodoSeleccionado.padre) return;
            const padre = nodoSeleccionado.padre;

            if (!AJUSTES.fraccionInteligente || padre.tipo !== TIPO.CONTENEDOR) {
                const f = crearEstructuraEstandar(TIPO.FRACCION, { numerador: null, denominador: null });
                insertarEnCursor(f); nodoSeleccionado = f.numerador.hijos[0]; return;
            }

            let idxActual = padre.hijos.indexOf(nodoSeleccionado);
            if (nodoSeleccionado.tipo === TIPO.HUECO) {
                delete registroNodos[nodoSeleccionado.id]; padre.hijos.splice(idxActual, 1); idxActual--;
            }

            if (idxActual < 0) {
                const nuevaFraccion = crearEstructuraEstandar(TIPO.FRACCION, { numerador: null, denominador: null });
                nuevaFraccion.padre = padre; padre.hijos.splice(0, 0, nuevaFraccion);
                nodoSeleccionado = nuevaFraccion.numerador.hijos[0]; return;
            }

            const idxInicio = escanearFronteraIzquierda(padre, idxActual);
            const nodosAtrapados = padre.hijos.splice(idxInicio, idxActual - idxInicio + 1);
            
            const nuevaFraccion = crearEstructuraEstandar(TIPO.FRACCION, { numerador: null, denominador: null });
            
            // Reemplazamos el hueco del numerador por los atrapados
            const contNum = nuevaFraccion.numerador;
            delete registroNodos[contNum.hijos[0].id];
            contNum.hijos = nodosAtrapados;
            nodosAtrapados.forEach(n => n.padre = contNum);

            nuevaFraccion.padre = padre;
            padre.hijos.splice(idxInicio, 0, nuevaFraccion);
            nodoSeleccionado = nuevaFraccion.denominador.hijos[0];
        }

        // ==========================================
        // 3. TRADUCTOR: AST -> MATHJAX
        // ==========================================
        function compilarALatex(nodo) {
            if (!nodo) return "";
            let latexInterno = "";

            switch (nodo.tipo) {
                case TIPO.VARIABLE: case TIPO.NUMERO: case TIPO.OPERADOR: latexInterno = nodo.valor; break;
                case TIPO.HUECO: latexInterno = "\\square"; break;
                case TIPO.FRACCION: latexInterno = `\\frac{${compilarALatex(nodo.numerador)}}{${compilarALatex(nodo.denominador)}}`; break;
                case TIPO.INTEGRAL: latexInterno = `\\int_{${compilarALatex(nodo.inferior)}}^{${compilarALatex(nodo.superior)}} ${compilarALatex(nodo.integrando)}`; break;
                case TIPO.RAIZ: latexInterno = `\\sqrt{${compilarALatex(nodo.interior)}}`; break;
                case TIPO.PARENTESIS: latexInterno = `\\left( ${compilarALatex(nodo.interior)} \\right)`; break;
                case TIPO.FUNCION: latexInterno = `\\${nodo.nombre}{\\left( ${compilarALatex(nodo.argumento)} \\right)}`; break;
                case TIPO.SUBSUPER: latexInterno = `{${compilarALatex(nodo.base)}}_{${compilarALatex(nodo.subindice)}}^{${compilarALatex(nodo.exponente)}}`; break;
                case TIPO.CONTENEDOR: latexInterno = nodo.hijos.length === 0 ? "\\square" : nodo.hijos.map(compilarALatex).join(""); break;
            }

            if (nodo === arbolPrincipal) return latexInterno;
            const claseActiva = (nodoSeleccionado && nodo.id === nodoSeleccionado.id) ? " seleccionado" : "";
            return `\\class{hitbox${claseActiva}}{\\cssId{${nodo.id}}{${latexInterno}}}`;
        }

        function renderizar() {
            const lienzo = document.getElementById('lienzo');
            if (!lienzo) return;
            lienzo.innerHTML = `$$ ${compilarALatex(arbolPrincipal)} $$`; 
            if (window.MathJax && window.MathJax.typesetPromise) { MathJax.typesetPromise([lienzo]).catch(err => console.error(err)); } 
            else { setTimeout(renderizar, 50); }
        }

        // ==========================================
        // 4. ALGORITMOS DE NAVEGACIÓN FANTASMA
        // ==========================================
        function navegarFantasmaDerecha() {
            if (!nodoSeleccionado) return;
            let actual = nodoSeleccionado;

            // Si estamos en un hueco o caracter dentro de un contenedor
            if (actual.padre && actual.padre.tipo === TIPO.CONTENEDOR) {
                const padre = actual.padre;
                const idx = padre.hijos.indexOf(actual);

                if (idx < padre.hijos.length - 1) {
                    // Hay un hermano a la derecha
                    let hermano = padre.hijos[idx + 1];
                    // Si el hermano es una estructura, entrar en su primer slot
                    if (hermano.tipo === TIPO.FRACCION) nodoSeleccionado = hermano.numerador.hijos[0];
                    else if (hermano.tipo === TIPO.INTEGRAL) nodoSeleccionado = hermano.inferior.hijos[0];
                    else if ([TIPO.RAIZ, TIPO.PARENTESIS, TIPO.FUNCION].includes(hermano.tipo)) nodoSeleccionado = (hermano.interior || hermano.argumento).hijos[0];
                    else if (hermano.tipo === TIPO.SUBSUPER) nodoSeleccionado = hermano.base.hijos[0];
                    else nodoSeleccionado = hermano;
                    return;
                } else {
                    // Fin del contenedor. Toca saltar a la siguiente ranura de la estructura padre
                    const estructura = padre.padre;
                    if (!estructura) return; // Raíz principal

                    if (estructura.tipo === TIPO.FRACCION) {
                        if (padre === estructura.numerador) { nodoSeleccionado = estructura.denominador.hijos[0]; return; }
                        if (padre === estructura.denominador) { actual = estructura; } // Sale de la fraccion, buscar hermano de la fraccion
                    } else if (estructura.tipo === TIPO.INTEGRAL) {
                        if (padre === estructura.inferior) { nodoSeleccionado = estructura.superior.hijos[0]; return; }
                        if (padre === estructura.superior) { nodoSeleccionado = estructura.integrando.hijos[0]; return; }
                        if (padre === estructura.integrando) { actual = estructura; }
                    } else if (estructura.tipo === TIPO.SUBSUPER) {
                        if (padre === estructura.base) { nodoSeleccionado = estructura.exponente.hijos[0]; return; }
                        if (padre === estructura.exponente) { actual = estructura; }
                    } else {
                        // Raiz, Parentesis, Funcion (solo tienen 1 ranura), así que salimos
                        actual = estructura;
                    }
                }
            }

            // Si "actual" ahora es una estructura entera (porque acabamos de salir de ella), 
            // seleccionamos a su hermano derecho
            if (actual.padre && actual.padre.tipo === TIPO.CONTENEDOR) {
                const padreCont = actual.padre;
                const idxCont = padreCont.hijos.indexOf(actual);
                if (idxCont < padreCont.hijos.length - 1) {
                    nodoSeleccionado = padreCont.hijos[idxCont + 1];
                } else {
                    nodoSeleccionado = actual; // Se queda en la estructura si no hay nada más
                }
            }
        }

        function navegarFantasmaIzquierda() {
            if (!nodoSeleccionado) return;
            let actual = nodoSeleccionado;

            // Si la estructura entera está seleccionada, entrar al final de su última ranura
            if (actual.tipo !== TIPO.HUECO && actual.tipo !== TIPO.VARIABLE && actual.tipo !== TIPO.NUMERO && actual.tipo !== TIPO.OPERADOR && actual.tipo !== TIPO.CONTENEDOR) {
                 if (actual.tipo === TIPO.FRACCION) { nodoSeleccionado = actual.denominador.hijos[actual.denominador.hijos.length-1]; return; }
                 if (actual.tipo === TIPO.INTEGRAL) { nodoSeleccionado = actual.integrando.hijos[actual.integrando.hijos.length-1]; return; }
                 if ([TIPO.RAIZ, TIPO.PARENTESIS, TIPO.FUNCION].includes(actual.tipo)) { const p = (actual.interior || actual.argumento); nodoSeleccionado = p.hijos[p.hijos.length-1]; return; }
                 if (actual.tipo === TIPO.SUBSUPER) { nodoSeleccionado = actual.exponente.hijos[actual.exponente.hijos.length-1]; return; }
            }

            if (actual.padre && actual.padre.tipo === TIPO.CONTENEDOR) {
                const padre = actual.padre;
                const idx = padre.hijos.indexOf(actual);

                if (idx > 0) {
                    let hermano = padre.hijos[idx - 1];
                    if (hermano.tipo === TIPO.FRACCION) nodoSeleccionado = hermano.denominador.hijos[hermano.denominador.hijos.length-1];
                    else if (hermano.tipo === TIPO.INTEGRAL) nodoSeleccionado = hermano.integrando.hijos[hermano.integrando.hijos.length-1];
                    else if ([TIPO.RAIZ, TIPO.PARENTESIS, TIPO.FUNCION].includes(hermano.tipo)) { const p = (hermano.interior || hermano.argumento); nodoSeleccionado = p.hijos[p.hijos.length-1]; }
                    else if (hermano.tipo === TIPO.SUBSUPER) nodoSeleccionado = hermano.exponente.hijos[hermano.exponente.hijos.length-1];
                    else nodoSeleccionado = hermano;
                    return;
                } else {
                    const estructura = padre.padre;
                    if (!estructura) return; 

                    if (estructura.tipo === TIPO.FRACCION) {
                        if (padre === estructura.denominador) { nodoSeleccionado = estructura.numerador.hijos[estructura.numerador.hijos.length-1]; return; }
                        if (padre === estructura.numerador) { actual = estructura; } 
                    } else if (estructura.tipo === TIPO.INTEGRAL) {
                        if (padre === estructura.integrando) { nodoSeleccionado = estructura.superior.hijos[estructura.superior.hijos.length-1]; return; }
                        if (padre === estructura.superior) { nodoSeleccionado = estructura.inferior.hijos[estructura.inferior.hijos.length-1]; return; }
                        if (padre === estructura.inferior) { actual = estructura; }
                    } else if (estructura.tipo === TIPO.SUBSUPER) {
                        if (padre === estructura.exponente) { nodoSeleccionado = estructura.base.hijos[estructura.base.hijos.length-1]; return; }
                        if (padre === estructura.base) { actual = estructura; }
                    } else {
                        actual = estructura;
                    }
                }
            }

            if (actual.padre && actual.padre.tipo === TIPO.CONTENEDOR) {
                const padreCont = actual.padre;
                const idxCont = padreCont.hijos.indexOf(actual);
                if (idxCont > 0) {
                    nodoSeleccionado = padreCont.hijos[idxCont - 1];
                } else {
                    nodoSeleccionado = actual; 
                }
            }
        }


        // ==========================================
        // 5. CONTROLADOR DE EVENTOS
        // ==========================================
        document.addEventListener('click', function(event) {
            const elementoClicado = event.target.closest('.hitbox');
            if (elementoClicado && registroNodos[elementoClicado.id]) {
                event.stopPropagation(); nodoSeleccionado = registroNodos[elementoClicado.id]; renderizar();
            }
        });

        const tecladoComun = {
            "Backspace": "borrar_bloque", "ArrowUp": "navegar_arriba", "ArrowDown": "navegar_abajo",
            "ArrowRight": "navegar_derecha", "ArrowLeft": "navegar_izquierda"
        };

        document.addEventListener('keydown', function(event) {
            if ((event.ctrlKey || event.metaKey) && event.key === 'z') { event.preventDefault(); deshacer(); return; }
            if (["Shift", "Control", "Meta"].includes(event.key)) return;
            if (event.altKey && (event.key === 'ArrowRight' || event.key === 'ArrowLeft')) event.preventDefault();
            if (event.key === 'Escape') { modoGlobal = 'COMANDO'; actualizarUI(); return; }
            if (modoGlobal === 'COMANDO' && event.key === 'i') { modoGlobal = 'INSERCION'; actualizarUI(); event.preventDefault(); return; }

            let comandoComun = tecladoComun[event.key];
            if (event.shiftKey) {
                if (event.key === 'ArrowRight') comandoComun = 'expandir_derecha';
                if (event.key === 'ArrowLeft') comandoComun = 'expandir_izquierda';
            } else if (event.altKey) {
                if (event.key === 'ArrowRight') comandoComun = 'navegar_fantasma_derecha';
                if (event.key === 'ArrowLeft') comandoComun = 'navegar_fantasma_izquierda';
            }

            const estadoPre = capturarEstadoPreMutacion();
            if (comandoComun || event.key.length === 1) if(!event.altKey) event.preventDefault();

            if (comandoComun) {
                switch (comandoComun) {
                    case "expandir_derecha":
                        if (!nodoSeleccionado || !nodoSeleccionado.padre) break;
                        const padreExpDer = nodoSeleccionado.padre;
                        if (padreExpDer.tipo === TIPO.CONTENEDOR) {
                            const idxDer = padreExpDer.hijos.indexOf(nodoSeleccionado);
                            if (idxDer >= 0 && idxDer < padreExpDer.hijos.length - 1) {
                                const hermanoDer = padreExpDer.hijos[idxDer + 1];
                                if (nodoSeleccionado.tipo === TIPO.CONTENEDOR && nodoSeleccionado !== arbolPrincipal) {
                                    hermanoDer.padre = nodoSeleccionado; nodoSeleccionado.hijos.push(hermanoDer); padreExpDer.hijos.splice(idxDer + 1, 1);
                                } else {
                                    const nuevoGrupoDer = crearNodoContenedor(); nuevoGrupoDer.padre = padreExpDer;
                                    nodoSeleccionado.padre = nuevoGrupoDer; hermanoDer.padre = nuevoGrupoDer;
                                    nuevoGrupoDer.hijos.push(nodoSeleccionado, hermanoDer);
                                    padreExpDer.hijos.splice(idxDer, 2, nuevoGrupoDer); nodoSeleccionado = nuevoGrupoDer;
                                }
                            }
                        }
                        break;

                    case "expandir_izquierda":
                        if (!nodoSeleccionado || !nodoSeleccionado.padre) break;
                        const padreExpIzq = nodoSeleccionado.padre;
                        if (padreExpIzq.tipo === TIPO.CONTENEDOR) {
                            const idxIzq = padreExpIzq.hijos.indexOf(nodoSeleccionado);
                            if (idxIzq > 0) {
                                const hermanoIzq = padreExpIzq.hijos[idxIzq - 1];
                                if (nodoSeleccionado.tipo === TIPO.CONTENEDOR && nodoSeleccionado !== arbolPrincipal) {
                                    hermanoIzq.padre = nodoSeleccionado; nodoSeleccionado.hijos.unshift(hermanoIzq); padreExpIzq.hijos.splice(idxIzq - 1, 1);
                                } else {
                                    const nuevoGrupoIzq = crearNodoContenedor(); nuevoGrupoIzq.padre = padreExpIzq;
                                    hermanoIzq.padre = nuevoGrupoIzq; nodoSeleccionado.padre = nuevoGrupoIzq;
                                    nuevoGrupoIzq.hijos.push(hermanoIzq, nodoSeleccionado);
                                    padreExpIzq.hijos.splice(idxIzq - 1, 2, nuevoGrupoIzq); nodoSeleccionado = nuevoGrupoIzq;
                                }
                            }
                        }
                        break;

                    case "borrar_bloque":
                        if (!nodoSeleccionado) break;
                        if (nodoSeleccionado.tipo === TIPO.CONTENEDOR && nodoSeleccionado !== arbolPrincipal) {
                            const padre = nodoSeleccionado.padre;
                            if (padre && padre.tipo === TIPO.CONTENEDOR && nodoSeleccionado.hijos.length > 0) {
                                const idx = padre.hijos.indexOf(nodoSeleccionado); const idViejo = nodoSeleccionado.id;
                                nodoSeleccionado.hijos.forEach(h => h.padre = padre);
                                paddle = padre.hijos.splice(idx, 1, ...nodoSeleccionado.hijos);
                                nodoSeleccionado = padre.hijos[idx + nodoSeleccionado.hijos.length - 1]; 
                                delete registroNodos[idViejo]; break;
                            }
                        }
                        if (nodoSeleccionado.tipo === TIPO.NUMERO && nodoSeleccionado.valor.length > 1) nodoSeleccionado.valor = nodoSeleccionado.valor.slice(0, -1);
                        else if (nodoSeleccionado.tipo !== TIPO.HUECO && nodoSeleccionado.padre) {
                            const idViejo = nodoSeleccionado.id; const padre = nodoSeleccionado.padre;
                            if (padre.tipo === TIPO.CONTENEDOR) {
                                const idx = padre.hijos.indexOf(nodoSeleccionado); padre.hijos.splice(idx, 1);
                                if (padre.hijos.length === 0) {
                                    if (padre === arbolPrincipal) {
                                        const nuevoHueco = crearNodoValor(TIPO.HUECO, null); nuevoHueco.padre = arbolPrincipal;
                                        arbolPrincipal.hijos.push(nuevoHueco); nodoSeleccionado = nuevoHueco;
                                    } else {
                                        const nuevoHueco = crearNodoValor(TIPO.HUECO, null); reemplazarEnPadre(padre, nuevoHueco);
                                        delete registroNodos[padre.id]; nodoSeleccionado = nuevoHueco;
                                    }
                                } else { nodoSeleccionado = padre.hijos[idx - 1] || padre.hijos[0]; }
                            } else {
                                const nuevoHueco = crearNodoValor(TIPO.HUECO, null); reemplazarEnPadre(nodoSeleccionado, nuevoHueco); nodoSeleccionado = nuevoHueco;
                            }
                            delete registroNodos[idViejo];
                        }
                        break;

                    case "navegar_arriba":
                        if (nodoSeleccionado && nodoSeleccionado.padre) {
                            nodoSeleccionado = nodoSeleccionado.padre;
                            if (nodoSeleccionado === arbolPrincipal) nodoSeleccionado = nodoSeleccionado.hijos[0];
                        }
                        break;

                    case "navegar_abajo":
                        if (!nodoSeleccionado) break;
                        if (nodoSeleccionado.tipo === TIPO.CONTENEDOR && nodoSeleccionado.hijos.length > 0) nodoSeleccionado = nodoSeleccionado.hijos[0];
                        else if (nodoSeleccionado.tipo === TIPO.FRACCION) nodoSeleccionado = nodoSeleccionado.numerador.hijos[0];
                        else if (nodoSeleccionado.tipo === TIPO.INTEGRAL) nodoSeleccionado = nodoSeleccionado.integrando.hijos[0];
                        else if (nodoSeleccionado.tipo === TIPO.RAIZ) nodoSeleccionado = nodoSeleccionado.interior.hijos[0];
                        else if (nodoSeleccionado.tipo === TIPO.PARENTESIS) nodoSeleccionado = nodoSeleccionado.interior.hijos[0];
                        else if (nodoSeleccionado.tipo === TIPO.FUNCION) nodoSeleccionado = nodoSeleccionado.argumento.hijos[0];
                        else if (nodoSeleccionado.tipo === TIPO.SUBSUPER) nodoSeleccionado = nodoSeleccionado.base.hijos[0];
                        break;

                    case "navegar_derecha":
                    case "navegar_izquierda":
                        if (!nodoSeleccionado || !nodoSeleccionado.padre) break;
                        const padreDir = nodoSeleccionado.padre;
                        const dir = comandoComun === "navegar_derecha" ? 1 : -1;

                        if (padreDir.tipo === TIPO.CONTENEDOR) {
                            const idx = padreDir.hijos.indexOf(nodoSeleccionado); const nuevoIdx = idx + dir;
                            if (nuevoIdx >= 0 && nuevoIdx < padreDir.hijos.length) nodoSeleccionado = padreDir.hijos[nuevoIdx];
                        } else if (padreDir.tipo === TIPO.FRACCION) {
                            if (nodoSeleccionado === padreDir.numerador && dir === 1) nodoSeleccionado = padreDir.denominador;
                            else if (nodoSeleccionado === padreDir.denominador && dir === -1) nodoSeleccionado = padreDir.numerador;
                        } else if (padreDir.tipo === TIPO.INTEGRAL) {
                            const orden = [padreDir.inferior, padreDir.superior, padreDir.integrando];
                            const nuevoIdx = orden.indexOf(nodoSeleccionado) + dir;
                            if (nuevoIdx >= 0 && nuevoIdx < orden.length) nodoSeleccionado = orden[nuevoIdx];
                        } else if (padreDir.tipo === TIPO.SUBSUPER) {
                            const orden = [padreDir.base, padreDir.subindice, padreDir.exponente].filter(n => n !== null);
                            const nuevoIdx = orden.indexOf(nodoSeleccionado) + dir;
                            if (nuevoIdx >= 0 && nuevoIdx < orden.length) nodoSeleccionado = orden[nuevoIdx];
                        }
                        break;

                    case "navegar_fantasma_derecha": navegarFantasmaDerecha(); break;
                    case "navegar_fantasma_izquierda": navegarFantasmaIzquierda(); break;
                }
            } 
            else if (modoGlobal === 'COMANDO' && event.key.length === 1) {
                switch(event.key) {
                    case 'f': 
                        if (nodoSeleccionado && nodoSeleccionado.tipo !== TIPO.HUECO) {
                            const f = crearEstructuraEstandar(TIPO.FRACCION, { numerador: null, denominador: null });
                            reemplazarEnPadre(nodoSeleccionado, f);
                            delete registroNodos[f.numerador.hijos[0].id]; f.numerador.hijos = [nodoSeleccionado]; nodoSeleccionado.padre = f.numerador;
                            nodoSeleccionado = f.denominador.hijos[0]; 
                        } else { 
                            const f = crearEstructuraEstandar(TIPO.FRACCION, { numerador: null, denominador: null });
                            insertarEnCursor(f); nodoSeleccionado = f.numerador.hijos[0];
                        }
                        break;
                    case 'I': 
                        const i = crearEstructuraEstandar(TIPO.INTEGRAL, { inferior: null, superior: null, integrando: null });
                        insertarEnCursor(i); nodoSeleccionado = i.inferior.hijos[0]; break;
                    case 'r': 
                        if (nodoSeleccionado && nodoSeleccionado.tipo !== TIPO.HUECO) {
                            const r = crearEstructuraEstandar(TIPO.RAIZ, { interior: null });
                            reemplazarEnPadre(nodoSeleccionado, r); delete registroNodos[r.interior.hijos[0].id];
                            r.interior.hijos = [nodoSeleccionado]; nodoSeleccionado.padre = r.interior;
                        } else { 
                            const r = crearEstructuraEstandar(TIPO.RAIZ, { interior: null });
                            insertarEnCursor(r); nodoSeleccionado = r.interior.hijos[0]; 
                        }
                        break;
                    case '(': 
                        if (nodoSeleccionado && nodoSeleccionado.tipo !== TIPO.HUECO) {
                            const p = crearEstructuraEstandar(TIPO.PARENTESIS, { interior: null });
                            reemplazarEnPadre(nodoSeleccionado, p); delete registroNodos[p.interior.hijos[0].id];
                            p.interior.hijos = [nodoSeleccionado]; nodoSeleccionado.padre = p.interior;
                        } else { 
                            const p = crearEstructuraEstandar(TIPO.PARENTESIS, { interior: null });
                            insertarEnCursor(p); nodoSeleccionado = p.interior.hijos[0];
                        }
                        break;
                }
            }
            else if (modoGlobal === 'INSERCION') {
                if (event.key === ' ') intentarCompilarFuncion();
                else if (event.key === '/') aplicarFraccionInteligente();
                else if (event.key === '(') {
                    if (!intentarCompilarFuncion()) {
                        const p = crearEstructuraEstandar(TIPO.PARENTESIS, { interior: null });
                        insertarEnCursor(p); nodoSeleccionado = p.interior.hijos[0];
                    }
                } 
                else if (event.key === ')') {
                    let nodoActual = nodoSeleccionado;
                    while (nodoActual && nodoActual.tipo !== TIPO.PARENTESIS && nodoActual.tipo !== TIPO.FUNCION) nodoActual = nodoActual.padre;
                    if (nodoActual) nodoSeleccionado = nodoActual;
                }
                else if (event.key === '^') {
                    if (nodoSeleccionado && nodoSeleccionado.tipo !== TIPO.HUECO) {
                        const s = crearEstructuraEstandar(TIPO.SUBSUPER, { base: null, subindice: null, exponente: null });
                        reemplazarEnPadre(nodoSeleccionado, s); delete registroNodos[s.base.hijos[0].id];
                        s.base.hijos = [nodoSeleccionado]; nodoSeleccionado.padre = s.base; nodoSeleccionado = s.exponente.hijos[0]; 
                    } else {
                        const s = crearEstructuraEstandar(TIPO.SUBSUPER, { base: null, subindice: null, exponente: null });
                        insertarEnCursor(s); nodoSeleccionado = s.base.hijos[0];
                    }
                }
                else if (event.key === '_') {
                    if (nodoSeleccionado && nodoSeleccionado.tipo !== TIPO.HUECO) {
                        const s = crearEstructuraEstandar(TIPO.SUBSUPER, { base: null, subindice: null, exponente: null });
                        reemplazarEnPadre(nodoSeleccionado, s); delete registroNodos[s.base.hijos[0].id];
                        s.base.hijos = [nodoSeleccionado]; nodoSeleccionado.padre = s.base; nodoSeleccionado = s.subindice.hijos[0]; 
                    } else {
                        const s = crearEstructuraEstandar(TIPO.SUBSUPER, { base: null, subindice: null, exponente: null });
                        insertarEnCursor(s); nodoSeleccionado = s.base.hijos[0];
                    }
                }
                else if (event.key.length === 1) {
                    if (/[0-9]/.test(event.key)) {
                        if (nodoSeleccionado && nodoSeleccionado.tipo === TIPO.NUMERO) nodoSeleccionado.valor += event.key;
                        else insertarEnCursor(crearNodoValor(TIPO.NUMERO, event.key));
                    } else if (/[a-zA-Z]/.test(event.key)) {
                        insertarEnCursor(crearNodoValor(TIPO.VARIABLE, event.key));
                    } else {
                        insertarEnCursor(crearNodoValor(TIPO.OPERADOR, event.key));
                    }
                }
            }

            evaluarYGuardarHistorial(estadoPre);
            renderizar();
        });

        window.addEventListener('load', renderizar);
    </script>
